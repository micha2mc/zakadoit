server:
  port: 8081
spring:
  application:
    name: Zakado IT

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/zakadoit
    username: root
    password:

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql
  mustache:
    check-template-location: false
vaadin:
  launch-browser: true
  allowed-packages:
    - "com.vaadin"
    - "org.vaadin"
    - "dev.hilla"
    - "com.uah.tfm.zakado.zkd"


logging:
  level:
    org:
      atmosphere: warn
