server:
  port: 8081
spring:
  #jpa:
    #defer-datasource-initialization: true
  #sql:
  #  init:
  #    mode: embedded  # o always
  #    data-locations: classpath:INSERT_DEFAULT_DATA.sql
  application:
    name: Zakado IT

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/zakadoit
    username: root
    password:

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  mustache:
    check-template-location: false
vaadin:
  launch-browser: true
  allowed-packages:
    - "com.vaadin"
    - "org.vaadin"
    - "dev.hilla"
    - "com.uah.tfm.zakado.zkd"


logging:
  level:
    org:
      atmosphere: warn
